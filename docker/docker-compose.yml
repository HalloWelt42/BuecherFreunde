services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - ${STORAGE_DIR:-../storage}:/app/storage
      - ${EXTERNAL_DIR:-../external}:/app/external:ro
      - ${IMPORT_DIR:-../import}:/app/import
      - ${DATABASE_DIR:-../database}:/app/database
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${EXTERNAL_PORT:-8160}:80"
    depends_on:
      backend:
        condition: service_healthy
