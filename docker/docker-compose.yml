services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - STORAGE_DIR=/app/storage
      - EXTERNAL_DIR=/app/external
      - IMPORT_DIR=/app/import
      - DATABASE_DIR=/app/database
      - HOST_STORAGE_DIR=${STORAGE_DIR:-./storage}
      - HOST_EXTERNAL_DIR=${EXTERNAL_DIR:-./external}
      - HOST_IMPORT_DIR=${IMPORT_DIR:-./import}
      - HOST_DATABASE_DIR=${DATABASE_DIR:-./database}
    volumes:
      - ${STORAGE_DIR:-../storage}:/app/storage
      - ${EXTERNAL_DIR:-../external}:/app/external:ro
      - ${IMPORT_DIR:-../import}:/app/import
      - ${DATABASE_DIR:-../database}:/app/database
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ..
      dockerfile: frontend/Dockerfile
    restart: unless-stopped
    ports:
      - "${EXTERNAL_PORT:-8160}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: '0.5'
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
