types {
    application/javascript mjs;
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip-Komprimierung
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/wasm;
    gzip_min_length 1000;

    # Cache fuer statische Dateien
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # API-Proxy zum Backend
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE-Unterstuetzung
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 86400;

        # Range-Requests fuer Buchdateien
        proxy_set_header Range $http_range;
        proxy_set_header If-Range $http_if_range;
    }

    # SPA-Fallback: alle Routen auf index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
